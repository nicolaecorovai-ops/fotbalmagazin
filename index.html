<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Pro Store</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f4f8;
}

header{
    background:#0b3d91;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{margin:0}

.cart-btn{
    background:white;
    color:#0b3d91;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.hero{
    background:url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2") center/cover;
    padding:80px;
    color:white;
    text-align:center;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card button{
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#0b3d91;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

footer{
    background:#072c66;
    color:white;
    text-align:center;
    padding:20px;
}

/* CART MODAL */
.cart-modal{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.cart-content{
    background:white;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:10px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h1>⚽ Football Pro Store</h1>
<div class="cart-btn" onclick="toggleCart()">
🛒 Coș (<span id="cartCount">0</span>)
</div>
</header>

<section class="hero">
<h2>Echipament oficial pentru performanță</h2>
<p>Calitate premium • Livrare rapidă</p>
</section>

<section class="products" id="products"></section>

<footer>
<p>© 2026 Football Pro Store</p>
</footer>

<!-- CART -->
<div class="cart-modal" id="cartModal">
<div class="cart-content">
<h2>Coșul tău</h2>
<div id="cartItems"></div>
<h3>Total: <span id="totalPrice">0</span> lei</h3>
<button onclick="toggleCart()">Închide</button>
</div>
</div>

<script>
const products = [
    {id:1, name:"Ghete profesionale", price:1200, img:"https://images.unsplash.com/photo-1599058917212-d750089bc07e"},
    {id:2, name:"Minge oficială", price:450, img:"https://images.unsplash.com/photo-1521417531039-40aefb6caa2c"},
    {id:3, name:"Echipament complet", price:800, img:"https://images.unsplash.com/photo-1517649763962-0c623066013b"},
    {id:4, name:"Mănuși portar", price:350, img:"https://images.unsplash.com/photo-1606925797300-0b35e9d1794e"}
];

let cart = [];

const productsDiv = document.getElementById("products");

products.forEach(p=>{
    productsDiv.innerHTML += `
    <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} lei</p>
        <button onclick="addToCart(${p.id})">Adaugă în coș</button>
    </div>`;
});

function addToCart(id){
    const product = products.find(p=>p.id===id);
    cart.push(product);
    updateCart();
}

function updateCart(){
    document.getElementById("cartCount").innerText = cart.length;
    const cartItems = document.getElementById("cartItems");
    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item,index)=>{
        total += item.price;
        cartItems.innerHTML += `
        <div class="cart-item">
            <span>${item.name}</span>
            <span>${item.price} lei ❌</span>
        </div>`;
    });

    document.getElementById("totalPrice").innerText = total;
}

function toggleCart(){
    const modal = document.getElementById("cartModal");
    modal.style.display = modal.style.display === "flex" ? "none" : "flex";
}
</script>

</body>
</html>
